# Stack runtime : API (healthy) → UI nginx
# Prérequis : loadouts dans backend/data/processed/ (pipeline assign ou post-process)
#
#   docker compose -f deploy/docker-compose.stack.yml up -d
#   → UI http://localhost:8080  |  API http://localhost:8000

name: nanoka-stack

services:
  api:
    build:
      context: ../backend
      dockerfile: deploy/Dockerfile.api
    image: nanoka-api:latest
    user: "1000:1000"
    volumes:
      - ../backend/data:/app/data
    working_dir: /app
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      # Origines autorisees pour le CORS (acces direct a l'API :8000 depuis le navigateur).
      # Via nginx (/api proxifie), l'UI est en meme origine : le CORS ne se declenche pas.
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
      # Hotes HTTP acceptes (anti Host spoofing). En prod, mettre ton domaine
      # MAIS conserver 127.0.0.1 (utilise par le healthcheck), ex. "mon-domaine.fr,127.0.0.1".
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  web:
    build:
      context: ../frontend
      dockerfile: deploy/Dockerfile
    image: nanoka-web:latest
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8080}:80"
    environment:
      API_UPSTREAM: http://api:8000
