services:
  scrape:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.scraper
    image: nanoka-scraper:latest
    user: "1000:1000"
    volumes:
      - ../data:/app/data
    working_dir: /app
    shm_size: "2gb"

  pipeline:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.pipeline
    image: nanoka-pipeline:latest
    user: "1000:1000"
    volumes:
      - ../data:/app/data
    working_dir: /app

  post-process:
    profiles: ["full"]
    image: nanoka-pipeline:latest
    user: "1000:1000"
    depends_on:
      scrape:
        condition: service_completed_successfully
    volumes:
      - ../data:/app/data
    working_dir: /app
    command: >
      sh -c "python -m nanoka.assign && python -m nanoka.ascension_report && python -m nanoka.weapon_report && python -m nanoka.talent_report"
