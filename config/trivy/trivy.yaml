# Configuration Trivy — https://trivy.dev/docs/latest/references/configuration/config-file/
# Usage : trivy fs --config config/trivy/trivy.yaml .

scan:
  scanners:
    - vuln
    - secret
    - misconfig
  file-patterns:
    - "pip:requirements/requirements.txt"
    - "pip:requirements/requirements-scraper.txt"
    - "pip:requirements/requirements-dev.txt"
  detection-priority: comprehensive
  skip-dirs:
    - .venv
    - .git
    - .pytest_cache
    - __pycache__
    - data
    - .mypy_cache
    - .idea
    - .vscode

severity:
  - CRITICAL
  - HIGH
  - MEDIUM
  - LOW
  - UNKNOWN

format: table
exit-code: 1
exit-on-eol: 0

vulnerability:
  ignore-unfixed: false

misconfiguration:
  scanners:
    - dockerfile
