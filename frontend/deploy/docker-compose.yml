# UI seule (API sur l'hôte ou stack deploy/docker-compose.stack.yml)
# Pour un ordre garanti API → web, préférer deploy/docker-compose.stack.yml

services:
  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: nanoka-web:latest
    ports:
      - "${WEB_PORT:-8080}:80"
    environment:
      API_UPSTREAM: ${API_UPSTREAM:-http://host.docker.internal:8000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
