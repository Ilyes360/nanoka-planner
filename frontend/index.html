<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nanoka Planner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Sora:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/index.css" />
    <script>
      try {
        var t = localStorage.getItem("nanoka-background");
        if (t) document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    </script>
  </head>
  <body>
    <div class="app">
      <header class="header">
        <a href="/" class="brand" data-link>Nanoka Planner</a>
        <nav class="nav">
          <a href="/characters" data-link>Characters</a>
          <a href="/weapons" data-link>Weapons</a>
        </nav>
        <div class="theme-picker" id="theme-picker"></div>
      </header>
      <main id="app" class="main"></main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
