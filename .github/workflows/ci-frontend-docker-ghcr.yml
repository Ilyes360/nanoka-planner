name: CI Frontend Docker + Security

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/ci-frontend-docker-ghcr.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/ci-frontend-docker-ghcr.yml"

permissions:
  contents: read
  packages: write

defaults:
  run:
    working-directory: frontend

jobs:
  build:
    name: Job 1 - Build static assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: frontend/dist
          if-no-files-found: error

  docker:
    name: Job 2 - Build, Trivy, push GHCR
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Normalize GHCR owner (lowercase)
        id: ghcr_owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/deploy/Dockerfile
          push: false
          load: true
          tags: ghcr.io/${{ steps.ghcr_owner.outputs.owner }}/nanoka-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan web image (block CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ghcr.io/${{ steps.ghcr_owner.outputs.owner }}/nanoka-web:${{ github.sha }}
          severity: CRITICAL
          exit-code: "1"
          trivyignores: frontend/config/trivy/.trivyignore

      - name: Push web image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/deploy/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.ghcr_owner.outputs.owner }}/nanoka-web:latest
            ghcr.io/${{ steps.ghcr_owner.outputs.owner }}/nanoka-web:${{ github.sha }}
          cache-from: type=gha
