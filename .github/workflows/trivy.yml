name: Trivy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  filesystem:
    name: FS (deps + secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan filesystem
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          config: .trivy.yaml
          severity: CRITICAL,HIGH
          exit-code: "1"
          trivyignores: .trivyignore
          trivy-args: --detection-priority comprehensive

  config:
    name: IaC (Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan Dockerfiles
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"
          trivyignores: .trivyignore

  docker-images:
    name: Images Docker
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: docker compose build

      - name: Scan pipeline image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: nanoka-pipeline:latest
          severity: CRITICAL,HIGH
          exit-code: "1"
          trivyignores: .trivyignore

      - name: Scan scraper image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: nanoka-scraper:latest
          severity: CRITICAL,HIGH
          exit-code: "1"
          trivyignores: .trivyignore
