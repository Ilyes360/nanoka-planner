name: CI Docker + Security

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/ci-docker-ghcr.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/ci-docker-ghcr.yml"

permissions:
  contents: read
  packages: write

defaults:
  run:
    working-directory: backend

jobs:
  test:
    name: Job 1 - Lint, tests, coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements/requirements.txt
            backend/requirements/requirements-dev.txt
            backend/requirements/requirements-scraper.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/requirements-dev.txt
          pip install ruff

      - name: Lint
        run: ruff check nanoka tests

      - name: Unit tests + coverage
        run: pytest --cov=nanoka --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: backend/coverage.xml
          if-no-files-found: error

  build:
    name: Job 2 - Build, Trivy, push GHCR
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Normalize GHCR owner (lowercase)
        id: ghcr_owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build pipeline image
        uses: docker/build-push-action@v6
        id: build_pipeline
        with:
          context: backend
          file: backend/deploy/Dockerfile.pipeline
          push: false
          load: true
          tags: ghcr.io/${{ steps.ghcr_owner.outputs.owner }}/nanoka-pipeline:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build scraper image
        uses: docker/build-push-action@v6
        id: build_scraper
        with:
          context: backend
          file: backend/deploy/Dockerfile.scraper
          push: false
          load: true
          tags: ghcr.io/${{ steps.ghcr_owner.outputs.owner }}/nanoka-scraper:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan pipeline image (block CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ghcr.io/${{ steps.ghcr_owner.outputs.owner }}/nanoka-pipeline:${{ github.sha }}
          severity: CRITICAL
          exit-code: "1"
          trivyignores: backend/config/trivy/.trivyignore

      - name: Trivy scan scraper image (block CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ghcr.io/${{ steps.ghcr_owner.outputs.owner }}/nanoka-scraper:${{ github.sha }}
          severity: CRITICAL
          exit-code: "1"
          trivyignores: backend/config/trivy/.trivyignore

      - name: Push pipeline image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/deploy/Dockerfile.pipeline
          push: true
          tags: |
            ghcr.io/${{ steps.ghcr_owner.outputs.owner }}/nanoka-pipeline:latest
            ghcr.io/${{ steps.ghcr_owner.outputs.owner }}/nanoka-pipeline:${{ github.sha }}
          cache-from: type=gha

      - name: Push scraper image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/deploy/Dockerfile.scraper
          push: true
          tags: |
            ghcr.io/${{ steps.ghcr_owner.outputs.owner }}/nanoka-scraper:latest
            ghcr.io/${{ steps.ghcr_owner.outputs.owner }}/nanoka-scraper:${{ github.sha }}
          cache-from: type=gha
